<section class="section-team">
  <div class="container container-md">
    <div class="section-header">
      <h2>L'équipe derrière [siteName]</h2>
      <p class="subtitle">Une équipe restreinte, mais redoutablement efficace.</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--space-4);">
      <div style="display:flex;align-items:center;gap:var(--space-5);padding:var(--space-5);border:1px solid var(--gray-200);border-radius:var(--radius-xl);">
        <div class="member-photo member-photo-1" style="width:64px;height:64px;margin:0;flex-shrink:0;"><span class="member-emoji" style="font-size:28px;">👩‍💼</span></div>
        <div>
          <h3 style="font-weight:700;color:var(--gray-900);">Claire Dupont</h3>
          <p style="color:var(--primary);font-size:var(--text-sm);">CEO & Fondatrice</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:var(--space-5);padding:var(--space-5);border:1px solid var(--gray-200);border-radius:var(--radius-xl);">
        <div class="member-photo member-photo-2" style="width:64px;height:64px;margin:0;flex-shrink:0;"><span class="member-emoji" style="font-size:28px;">👨‍💻</span></div>
        <div>
          <h3 style="font-weight:700;color:var(--gray-900);">Antoine Bernard</h3>
          <p style="color:var(--primary);font-size:var(--text-sm);">CTO</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:var(--space-5);padding:var(--space-5);border:1px solid var(--gray-200);border-radius:var(--radius-xl);">
        <div class="member-photo member-photo-3" style="width:64px;height:64px;margin:0;flex-shrink:0;"><span class="member-emoji" style="font-size:28px;">👩‍🎨</span></div>
        <div>
          <h3 style="font-weight:700;color:var(--gray-900);">Léa Moreau</h3>
          <p style="color:var(--primary);font-size:var(--text-sm);">Directrice Design</p>
        </div>
      </div>
    </div>
  </div>
</section>
