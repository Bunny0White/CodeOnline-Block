<section class="section-products">
  <div class="container container-md">
    <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-8);padding:var(--space-8);">
      <div class="product-image product-image-1" style="height:100%;border-radius:var(--radius-xl);font-size:5rem;"></div>
      <div>
        <div class="badge badge-soft-success" style="margin-bottom:var(--space-3);">En stock</div>
        <h3 style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--gray-900);margin-bottom:var(--space-2);">Sneakers Urban Edition</h3>
        <div class="stars" style="font-size:var(--text-base);margin-bottom:var(--space-4);">★★★★★ <span style="color:var(--gray-500);font-size:var(--text-sm);">(124 avis)</span></div>
        <p style="color:var(--gray-600);margin-bottom:var(--space-6);">Une paire iconique, confortable et durable, conçue pour un usage quotidien.</p>
        <div class="product-price" style="margin-bottom:var(--space-6);">89€ <span class="product-price-old">119€</span></div>
        <div style="display:flex;gap:var(--space-3);">
          <button class="btn btn-primary btn-full">Ajouter au panier</button>
          <button class="btn btn-secondary">♡</button>
        </div>
      </div>
    </div>
  </div>
</section>
