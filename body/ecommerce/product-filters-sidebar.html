<section class="section-products">
  <div class="container container-xl">
    <div style="display:grid;grid-template-columns:240px 1fr;gap:var(--space-10);">
      <aside>
        <h3 style="font-weight:700;color:var(--gray-900);margin-bottom:var(--space-5);">Filtres</h3>
        <div class="form-group">
          <label class="form-label">Catégorie</label>
          <div style="display:flex;flex-direction:column;gap:var(--space-2);">
            <label style="display:flex;gap:var(--space-2);align-items:center;font-size:var(--text-sm);color:var(--gray-700);"><input type="checkbox" checked> Chaussures</label>
            <label style="display:flex;gap:var(--space-2);align-items:center;font-size:var(--text-sm);color:var(--gray-700);"><input type="checkbox"> Sacs</label>
            <label style="display:flex;gap:var(--space-2);align-items:center;font-size:var(--text-sm);color:var(--gray-700);"><input type="checkbox"> Accessoires</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Prix maximum</label>
          <input type="range" style="width:100%;accent-color:var(--primary);">
        </div>
      </aside>
      <div class="product-grid">
        <div class="product-card">
          <div class="product-image product-image-1">👟</div>
          <div class="product-body">
            <div class="badge badge-soft-primary">Nouveau</div>
            <h3 class="product-name">Sneakers Urban</h3>
            <p class="product-desc">Confort et style au quotidien.</p>
            <div class="product-footer">
              <span class="product-price">89€</span>
              <button class="btn btn-primary btn-sm">+</button>
            </div>
          </div>
        </div>
        <div class="product-card">
          <div class="product-image product-image-2">👜</div>
          <div class="product-body">
            <h3 class="product-name">Sac Cuir Premium</h3>
            <p class="product-desc">Élégance et durabilité.</p>
            <div class="product-footer">
              <span class="product-price">149€</span>
              <button class="btn btn-primary btn-sm">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
