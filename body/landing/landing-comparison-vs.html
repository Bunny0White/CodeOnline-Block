<section class="section-comparison-table">
  <div class="container container-md">
    <div class="section-header">
      <h2>[siteName] vs faire à l'ancienne</h2>
      <p class="subtitle">La différence est flagrante dès la première semaine.</p>
    </div>
    <div class="comparison-table-wrap">
      <table class="comparison-table">
        <thead>
          <tr>
            <th>Tâche</th>
            <th>Méthode classique</th>
            <th class="col-featured">Avec [siteName]</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="feature-name">Génération de rapport</td>
            <td>2 heures</td>
            <td class="col-featured">30 secondes</td>
          </tr>
          <tr>
            <td class="feature-name">Coordination équipe</td>
            <td>Emails interminables</td>
            <td class="col-featured">Automatique</td>
          </tr>
          <tr>
            <td class="feature-name">Suivi des résultats</td>
            <td>Fichier Excel manuel</td>
            <td class="col-featured">Temps réel</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
