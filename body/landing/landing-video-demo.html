<section style="padding:var(--space-24) 0;background:var(--gray-900);">
  <div class="container container-lg">
    <div class="section-header">
      <h2 style="color:var(--white);">Voyez [siteName] en action</h2>
      <p class="subtitle-dark">2 minutes pour comprendre comment ça fonctionne.</p>
    </div>
    <div style="position:relative;border-radius:var(--radius-2xl);overflow:hidden;aspect-ratio:16/9;max-width:900px;margin:0 auto;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;">
      <button style="width:80px;height:80px;border-radius:var(--radius-full);background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-2xl);">
        <span style="width:0;height:0;border-top:14px solid transparent;border-bottom:14px solid transparent;border-left:20px solid var(--primary);margin-left:5px;"></span>
      </button>
    </div>
  </div>
</section>
