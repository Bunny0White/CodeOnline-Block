<section class="section-countdown">
  <div class="container container-xl">
    <div class="countdown-content">
      <span class="badge badge-soft-primary hero-badge">🔥 Offre de lancement</span>
      <h2 class="countdown-title">Notre produit sort dans</h2>
      <div class="countdown-timer">
        <div class="countdown-unit"><span class="countdown-number" id="days">12</span><span class="countdown-label">JOURS</span></div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit"><span class="countdown-number" id="hours">08</span><span class="countdown-label">HEURES</span></div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit"><span class="countdown-number" id="mins">34</span><span class="countdown-label">MINUTES</span></div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit"><span class="countdown-number" id="secs">59</span><span class="countdown-label">SECONDES</span></div>
      </div>
      <p style="color:rgba(255,255,255,.9);margin-bottom:var(--space-6)">Inscrivez-vous maintenant et obtenez 40% de réduction à vie !</p>
      <div class="countdown-email-form">
        <input type="email" class="input newsletter-input" placeholder="votre@email.com" style="flex:1;min-width:200px">
        <button class="btn btn-white">Je m'inscris</button>
      </div>
    </div>
  </div>
</section>
