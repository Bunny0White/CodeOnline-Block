<section class="section-contact-split">
  <div class="contact-split-left">
    <h2 class="contact-split-title">Parlons de votre projet</h2>
    <p class="contact-split-sub">Réponse sous 24h garantie.</p>
    <div class="contact-split-info">
      <div class="contact-split-item"><div class="contact-split-icon">📧</div><div><span class="contact-split-label">Email</span><strong>hello@studio.fr</strong></div></div>
      <div class="contact-split-item"><div class="contact-split-icon">📍</div><div><span class="contact-split-label">Adresse</span><strong>Paris, France</strong></div></div>
    </div>
  </div>
  <div class="contact-split-right">
    <div class="contact-split-form">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Prénom</label><input class="input" type="text" placeholder="Jean"></div>
        <div class="form-group"><label class="form-label">Nom</label><input class="input" type="text" placeholder="Dupont"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="input" type="email" placeholder="jean@example.com"></div>
      <div class="form-group"><label class="form-label">Message</label><textarea class="textarea" placeholder="Décrivez votre projet..."></textarea></div>
      <button class="btn btn-primary btn-full">Envoyer le message →</button>
    </div>
  </div>
</section>
