<section style="padding:var(--space-16) 0;background:var(--gray-50);">

    <div class="card" style="text-align:center;padding:var(--space-10);">
      <div class="newsletter-icon" style="font-size:36px;margin-bottom:var(--space-4);">✉️</div>
      <h3 style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;color:var(--gray-900);margin-bottom:var(--space-3);">Vous avez aimé cet article ?</h3>
      <p style="color:var(--gray-600);margin-bottom:var(--space-6);">Recevez nos prochains articles directement par email, une fois par semaine.</p>
      <div class="newsletter-form-inline" style="max-width:380px;">
        <input type="email" class="input" placeholder="votre@email.com">

    </div>
