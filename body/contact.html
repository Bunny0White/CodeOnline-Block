<section class="section-contact">
  <div class="container container-xl">
    <div class="contact-grid">
      <div class="contact-info">
        <h2>Contactez-nous</h2>
        <p>Notre équipe est là pour vous aider. Réponse garantie sous 24h.</p>
        <div class="contact-details">
          <div class="contact-item"><div class="contact-icon">📧</div><div><strong>Email</strong><p>contact@yoursite.com</p></div></div>
          <div class="contact-item"><div class="contact-icon">📞</div><div><strong>Téléphone</strong><p>+33 1 23 45 67 89</p></div></div>
          <div class="contact-item"><div class="contact-icon">📍</div><div><strong>Adresse</strong><p>123 Rue Example, Paris</p></div></div>
        </div>
      </div>
      <div class="contact-form">
        <div class="form-group"><label class="form-label">Nom complet</label><input class="input" type="text" placeholder="Jean Dupont"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="input" type="email" placeholder="jean@example.com"></div>
        <div class="form-group"><label class="form-label">Sujet</label><select class="select"><option>Choisir un sujet</option><option>Support technique</option><option>Demande commerciale</option><option>Autre</option></select></div>
        <div class="form-group"><label class="form-label">Message</label><textarea class="textarea" placeholder="Votre message..."></textarea></div>
        <button class="btn btn-primary btn-full">Envoyer le message</button>
      </div>
    </div>
  </div>
</section>
