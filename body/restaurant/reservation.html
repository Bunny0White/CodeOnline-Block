<section class="section-contact" style="background:var(--gray-900)">
  <div class="container container-xl">
    <div class="contact-grid">
      <div class="contact-info light">
        <h2>Réservez votre table</h2>
        <p>Réservation recommandée, surtout le week-end. Confirmation par email sous 2h.</p>
        <div class="contact-details">
          <div class="contact-item"><div class="contact-icon">🕐</div><div><strong style="color:var(--white)">Horaires</strong><p>Mar-Sam: 12h-14h / 19h-22h<br>Dimanche: 12h-15h</p></div></div>
          <div class="contact-item"><div class="contact-icon">📍</div><div><strong style="color:var(--white)">Adresse</strong><p>12 Rue de la Paix, Paris 75001</p></div></div>
        </div>
      </div>
      <div class="contact-form dark">
        <div class="form-group"><label class="form-label">Nom complet</label><input class="input input-dark" type="text" placeholder="Jean Dupont"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Date</label><input class="input input-dark" type="date"></div>
          <div class="form-group"><label class="form-label">Heure</label><select class="select input-dark"><option>12h00</option><option>12h30</option><option>19h00</option><option>19h30</option><option>20h00</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">Nombre de personnes</label><select class="select input-dark"><option>1</option><option>2</option><option>3-4</option><option>5-6</option><option>7+</option></select></div>
        <div class="form-group"><label class="form-label">Occasion spéciale</label><input class="input input-dark" type="text" placeholder="Anniversaire, romantique..."></div>
        <button class="btn btn-primary btn-full">Confirmer la réservation</button>
      </div>
    </div>
  </div>
</section>
